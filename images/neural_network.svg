<svg width="100%" viewBox="0 0 680 500" role="img" xmlns="http://www.w3.org/2000/svg">
<title>4-layer neural network diagram</title>
<desc>Neural network with input layer (784), three ReLU hidden layers (512, 256, 128), and softmax output layer (10 classes)</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: Arial, sans-serif; fill: #1a1a1a; }
    .th { font-size: 14px; font-weight: 500; }
    .ts { font-size: 12px; font-weight: 400; fill: #555; }
    .teal-fill { fill: #E1F5EE; stroke: #0F6E56; }
    .gray-fill { fill: #F1EFE8; stroke: #5F5E5A; }
    .purple-fill { fill: #EEEDFE; stroke: #534AB7; }
  </style>
</defs>

<!-- Background -->
<rect width="680" height="500" fill="white"/>

<!-- Connection lines -->
<line x1="88" y1="250" x2="172" y2="130" stroke="#ccc" stroke-width="0.5"/>
<line x1="88" y1="250" x2="172" y2="190" stroke="#ccc" stroke-width="0.5"/>
<line x1="88" y1="250" x2="172" y2="250" stroke="#ccc" stroke-width="0.5"/>
<line x1="88" y1="250" x2="172" y2="310" stroke="#ccc" stroke-width="0.5"/>
<line x1="88" y1="250" x2="172" y2="370" stroke="#ccc" stroke-width="0.5"/>

<line x1="228" y1="130" x2="312" y2="160" stroke="#ccc" stroke-width="0.5"/>
<line x1="228" y1="190" x2="312" y2="160" stroke="#ccc" stroke-width="0.5"/>
<line x1="228" y1="250" x2="312" y2="220" stroke="#ccc" stroke-width="0.5"/>
<line x1="228" y1="310" x2="312" y2="280" stroke="#ccc" stroke-width="0.5"/>
<line x1="228" y1="370" x2="312" y2="340" stroke="#ccc" stroke-width="0.5"/>
<line x1="228" y1="130" x2="312" y2="220" stroke="#ccc" stroke-width="0.5"/>
<line x1="228" y1="370" x2="312" y2="280" stroke="#ccc" stroke-width="0.5"/>

<line x1="368" y1="160" x2="452" y2="190" stroke="#ccc" stroke-width="0.5"/>
<line x1="368" y1="220" x2="452" y2="250" stroke="#ccc" stroke-width="0.5"/>
<line x1="368" y1="280" x2="452" y2="310" stroke="#ccc" stroke-width="0.5"/>
<line x1="368" y1="340" x2="452" y2="310" stroke="#ccc" stroke-width="0.5"/>
<line x1="368" y1="160" x2="452" y2="250" stroke="#ccc" stroke-width="0.5"/>
<line x1="368" y1="340" x2="452" y2="250" stroke="#ccc" stroke-width="0.5"/>

<line x1="508" y1="190" x2="572" y2="210" stroke="#ccc" stroke-width="0.5"/>
<line x1="508" y1="250" x2="572" y2="250" stroke="#ccc" stroke-width="0.5"/>
<line x1="508" y1="310" x2="572" y2="290" stroke="#ccc" stroke-width="0.5"/>
<line x1="508" y1="190" x2="572" y2="250" stroke="#ccc" stroke-width="0.5"/>
<line x1="508" y1="310" x2="572" y2="250" stroke="#ccc" stroke-width="0.5"/>

<!-- Input node -->
<rect x="20" y="206" width="68" height="88" rx="8" class="gray-fill" stroke-width="0.5"/>
<text class="th" x="54" y="240" text-anchor="middle" dominant-baseline="central">Input</text>
<text class="ts" x="54" y="262" text-anchor="middle" dominant-baseline="central">(784, m)</text>
<text class="ts" x="54" y="280" text-anchor="middle" dominant-baseline="central">flattened</text>

<!-- Layer 1 neurons -->
<circle cx="200" cy="130" r="18" class="teal-fill" stroke-width="0.5"/>
<circle cx="200" cy="190" r="18" class="teal-fill" stroke-width="0.5"/>
<circle cx="200" cy="250" r="18" class="teal-fill" stroke-width="0.5"/>
<circle cx="200" cy="310" r="18" class="teal-fill" stroke-width="0.5"/>
<circle cx="200" cy="370" r="18" class="teal-fill" stroke-width="0.5"/>
<text class="ts" x="200" y="408" text-anchor="middle">Layer 1</text>
<text class="ts" x="200" y="424" text-anchor="middle">512 · ReLU</text>

<!-- Layer 2 neurons -->
<circle cx="340" cy="160" r="18" class="teal-fill" stroke-width="0.5"/>
<circle cx="340" cy="220" r="18" class="teal-fill" stroke-width="0.5"/>
<circle cx="340" cy="280" r="18" class="teal-fill" stroke-width="0.5"/>
<circle cx="340" cy="340" r="18" class="teal-fill" stroke-width="0.5"/>
<text class="ts" x="340" y="408" text-anchor="middle">Layer 2</text>
<text class="ts" x="340" y="424" text-anchor="middle">256 · ReLU</text>

<!-- Layer 3 neurons -->
<circle cx="480" cy="190" r="18" class="teal-fill" stroke-width="0.5"/>
<circle cx="480" cy="250" r="18" class="teal-fill" stroke-width="0.5"/>
<circle cx="480" cy="310" r="18" class="teal-fill" stroke-width="0.5"/>
<text class="ts" x="480" y="408" text-anchor="middle">Layer 3</text>
<text class="ts" x="480" y="424" text-anchor="middle">128 · ReLU</text>

<!-- Output node -->
<rect x="572" y="186" width="88" height="128" rx="8" class="purple-fill" stroke-width="0.5"/>
<text class="th" x="616" y="222" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Output</text>
<text class="ts" x="616" y="244" text-anchor="middle" dominant-baseline="central" fill="#534AB7">(10, m)</text>
<text class="ts" x="616" y="264" text-anchor="middle" dominant-baseline="central" fill="#534AB7">Softmax</text>
<text class="ts" x="616" y="284" text-anchor="middle" dominant-baseline="central" fill="#534AB7">10 classes</text>

<!-- Ellipsis -->
<text class="ts" x="200" y="98" text-anchor="middle" fill="#aaa">⋮</text>
<text class="ts" x="340" y="118" text-anchor="middle" fill="#aaa">⋮</text>
<text class="ts" x="480" y="148" text-anchor="middle" fill="#aaa">⋮</text>

<!-- Title -->
<text class="th" x="340" y="472" text-anchor="middle">4-layer dense network · MNIST</text>
</svg>
