<svg width="680" height="420" viewBox="0 0 680 420" role="img" xmlns="http://www.w3.org/2000/svg">
<title>z_k = W4[k,:] @ a3 + b4[k]</title>
<desc>Illustration showing how row k of W4 dot products with a3 to produce z_k</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: Arial, sans-serif; fill: #1a1a1a; }
    .th { font-size: 14px; font-weight: 500; }
    .ts { font-size: 12px; fill: #555; }
    .gray { fill: #F1EFE8; stroke: #5F5E5A; }
    .teal { fill: #E1F5EE; stroke: #0F6E56; }
    .purple { fill: #EEEDFE; stroke: #534AB7; }
    .muted { fill: #aaa; }
    .dashed { stroke: #ccc; stroke-width: 0.5; stroke-dasharray: 4 3; fill: none; }
  </style>
</defs>

<rect width="680" height="420" fill="white"/>

<!-- W4 rows -->
<rect x="40" y="40"  width="160" height="18" rx="3" class="gray" stroke-width="0.5"/>
<rect x="40" y="62"  width="160" height="18" rx="3" class="gray" stroke-width="0.5"/>
<rect x="40" y="84"  width="160" height="18" rx="3" class="gray" stroke-width="0.5"/>
<text class="ts" x="120" y="52"  text-anchor="middle" dominant-baseline="central">row 0</text>
<text class="ts" x="120" y="74"  text-anchor="middle" dominant-baseline="central">row 1</text>
<text class="ts" x="120" y="95"  text-anchor="middle" dominant-baseline="central">row 2</text>
<text class="ts muted" x="120" y="120" text-anchor="middle" dominant-baseline="central">⋮</text>

<!-- Row k highlighted -->
<rect x="40" y="135" width="160" height="24" rx="3" class="teal" stroke-width="1"/>
<text class="th" x="120" y="147" text-anchor="middle" dominant-baseline="central" fill="#085041">W4[k, :]   (1×128)</text>

<text class="ts muted" x="120" y="174" text-anchor="middle" dominant-baseline="central">⋮</text>
<rect x="40" y="185" width="160" height="18" rx="3" class="gray" stroke-width="0.5"/>
<rect x="40" y="207" width="160" height="18" rx="3" class="gray" stroke-width="0.5"/>
<text class="ts" x="120" y="197" text-anchor="middle" dominant-baseline="central">row 8</text>
<text class="ts" x="120" y="219" text-anchor="middle" dominant-baseline="central">row 9</text>

<text class="th" x="120" y="248" text-anchor="middle">W4</text>
<text class="ts" x="120" y="264" text-anchor="middle">(10 × 128)</text>

<!-- @ symbol -->
<text class="th" x="228" y="147" text-anchor="middle" dominant-baseline="central">@</text>

<!-- a3 columns -->
<rect x="252" y="80" width="20" height="134" rx="3" class="purple" stroke-width="0.5"/>
<rect x="276" y="80" width="20" height="134" rx="3" class="purple" stroke-width="0.5"/>
<rect x="300" y="80" width="20" height="134" rx="3" class="purple" stroke-width="0.5"/>
<text class="ts muted" x="334" y="147" text-anchor="middle" dominant-baseline="central">…</text>
<rect x="348" y="80" width="20" height="134" rx="3" class="purple" stroke-width="0.5"/>

<text class="th" x="300" y="248" text-anchor="middle">a3</text>
<text class="ts" x="300" y="264" text-anchor="middle">(128 × m)</text>

<!-- + b4[k] -->
<text class="th" x="400" y="147" text-anchor="middle" dominant-baseline="central">+  b4[k]</text>
<text class="ts" x="400" y="168" text-anchor="middle" dominant-baseline="central">(scalar)</text>

<!-- arrow -->
<line x1="448" y1="147" x2="476" y2="147" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- z_k result -->
<rect x="480" y="132" width="160" height="30" rx="6" class="teal" stroke-width="1"/>
<text class="th" x="560" y="147" text-anchor="middle" dominant-baseline="central" fill="#085041">z_k   (1 × m)</text>
<text class="ts" x="560" y="178" text-anchor="middle">one row of z4</text>
<text class="ts" x="560" y="194" text-anchor="middle">class k logits</text>

<!-- dashed box showing z_k is one row of z4 -->
<line x1="480" y1="168" x2="480" y2="290" class="dashed"/>
<line x1="640" y1="168" x2="640" y2="290" class="dashed"/>
<line x1="480" y1="290" x2="640" y2="290" class="dashed"/>

<!-- note -->
<text class="ts muted" x="340" y="310" text-anchor="middle">z4 = W4 @ a3 + b4   →   all 10 rows stacked   →   (10 × m)</text>

<!-- title -->
<text class="th" x="340" y="380" text-anchor="middle">z_k = W4[k, :] @ a3 + b4[k]</text>
</svg>
